name: AKS Scheduled Start/Stop

on:
  schedule:
    - cron: "30 19 * * *" #  1:00 AM IST - Stop cluster
    - cron: "30 22 * * *" #  4:00 AM IST - Stop cluster
    - cron: "30 0 * * *"  #  6:00 AM IST - Stop cluster
    - cron: "30 4 * * *"  # 10:00 AM IST - Stop cluster
    - cron: "30 6 * * *"  # 12:00 PM IST - Stop cluster
    - cron: "30 8 * * *"  #  2:00 PM IST - Stop cluster
    - cron: "30 11 * * *" #  5:00 PM IST - Stop cluster
    - cron: "30 14 * * *" #  8:00 PM IST - Stop cluster

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: AVA-EUS-DATABRICKS-RG
  CLUSTER_NAME: ava-eus-dbw-cluster

jobs:
  stop-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Check and Stop AKS Cluster
        run: |
          STATE=$(az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --query "powerState.code" -o tsv)
          echo "Current cluster state: $STATE"

          if [ "$STATE" == "Running" ]; then
            echo "Stopping AKS cluster..."
            az aks stop \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.CLUSTER_NAME }}
            echo "Cluster stopped successfully."
          else
            echo "Cluster is already stopped. Skipping."
          fi
