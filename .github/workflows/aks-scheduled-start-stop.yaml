name: AKS Scheduled Start/Stop

on:
  schedule:
    - cron: "30 20 * * *" # 2:00 AM IST - Stop cluster
    - cron: "30 2 * * *"  # 8:00 AM IST - Start cluster

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: AVA-EUS-DATABRICKS-RG
  CLUSTER_NAME: ava-eus-dbw-cluster

jobs:
  stop-cluster:
    if: github.event.schedule == '30 20 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and Stop AKS Cluster
        run: |
          STATE=$(az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --query "powerState.code" -o tsv)
          echo "Current cluster state: $STATE"

          if [ "$STATE" == "Running" ]; then
            echo "Stopping AKS cluster..."
            az aks stop \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.CLUSTER_NAME }}
            echo "Cluster stopped successfully."
          else
            echo "Cluster is already stopped. Skipping."
          fi

  start-cluster:
    if: github.event.schedule == '30 2 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Check and Start AKS Cluster
        run: |
          STATE=$(az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --query "powerState.code" -o tsv)
          echo "Current cluster state: $STATE"

          if [ "$STATE" == "Stopped" ]; then
            echo "Starting AKS cluster..."
            az aks start \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.CLUSTER_NAME }}
            echo "Cluster started successfully."
          else
            echo "Cluster is already running. Skipping."
          fi
