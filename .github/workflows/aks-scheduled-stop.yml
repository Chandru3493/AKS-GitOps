name: AKS Scheduled Stop Every 2 Hours

on:
  schedule:
    - cron: "0 */2 * * *" # every 2 hours

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: cloudzen-prod-rg
  CLUSTER_NAME: cloudzen-prod-aks
  MANAGED_RG: cloudzen-prod-aks-mrg
  PRESERVE_IDENTITY: cloudzen-prod-aks-agentpool

jobs:
  stop-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Check and Stop AKS Cluster
        run: |
          STATE=$(az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --query "powerState.code" -o tsv)
          echo "Current cluster state: $STATE"

          if [ "$STATE" == "Running" ]; then
            echo "Stopping AKS cluster..."
            az aks stop \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --name ${{ env.CLUSTER_NAME }}
            echo "Cluster stopped successfully."
          else
            echo "Cluster is already stopped. Skipping."
          fi

      - name: Cleanup Managed Resource Group
        run: |
          echo "Fetching all resources in ${{ env.MANAGED_RG }} except ${{ env.PRESERVE_IDENTITY }}..."
          RESOURCE_IDS=$(az resource list \
            --resource-group ${{ env.MANAGED_RG }} \
            --query "[?name!='${{ env.PRESERVE_IDENTITY }}'].id" \
            -o tsv)

          if [ -z "$RESOURCE_IDS" ]; then
            echo "Nothing to delete."
          else
            echo "Deleting resources..."
            echo "$RESOURCE_IDS" | xargs -I{} az resource delete --ids {} --verbose
            echo "Cleanup complete."
          fi
