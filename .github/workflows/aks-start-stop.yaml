name: AKS Cluster Start/Stop

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Start or Stop the AKS cluster"
        required: true
        type: choice
        options:
          - start
          - stop

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: AVA-EUS-DATABRICKS-RG
  CLUSTER_NAME: ava-eus-dbw-cluster

jobs:
  aks-cluster-action:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login using Managed Identity
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Start AKS Cluster
        if: ${{ github.event.inputs.action == 'start' }}
        run: |
          echo "Starting AKS cluster ${{ env.CLUSTER_NAME }}..."
          az aks start \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }}
          echo "Cluster started successfully."

      - name: Stop AKS Cluster
        if: ${{ github.event.inputs.action == 'stop' }}
        run: |
          echo "Stopping AKS cluster ${{ env.CLUSTER_NAME }}..."
          az aks stop \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }}
          echo "Cluster stopped successfully."

      - name: Verify Cluster State
        run: |
          STATE=$(az aks show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.CLUSTER_NAME }} \
            --query "powerState.code" -o tsv)
          echo "Cluster power state: $STATE"
