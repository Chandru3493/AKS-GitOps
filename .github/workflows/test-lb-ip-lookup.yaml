name: Test - Get nginx-ingress LB IP via az

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  RESOURCE_GROUP: cloudzen-prod-rg
  CLUSTER_NAME: cloudzen-prod-aks
  MANAGED_RG: cloudzen-prod-aks-mrg

jobs:
  test-lb-ip:
    runs-on: ubuntu-latest
    steps:
      - name: Azure Login using Managed Identity
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get nginx-ingress LB IP via az
        run: |
          echo "Querying public IPs in managed RG: ${{ env.MANAGED_RG }}"

          for i in $(seq 1 30); do
            LB_IP=$(az network public-ip list \
              --resource-group ${{ env.MANAGED_RG }} \
              --query "[?ipAddress!=null].ipAddress | [0]" \
              -o tsv 2>/dev/null)
            if [[ -n "$LB_IP" ]]; then
              echo "Found LB IP: $LB_IP"
              echo "LB_IP=$LB_IP" >> $GITHUB_ENV
              break
            fi
            echo "Attempt $i/30 - no IP yet, waiting 10s..."
            sleep 10
          done

          if [[ -z "$LB_IP" ]]; then
            echo "Failed to get LB IP after 5 minutes."
            exit 1
          fi

      - name: Print result
        run: |
          echo "LB_IP from env: ${{ env.LB_IP }}"
