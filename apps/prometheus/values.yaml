prometheus:
  enabled: false
  prometheusSpec:
    retention: 3d
    externalUrl: "http://20.84.25.4/prometheus"
    routePrefix: /prometheus
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

grafana:
  enabled: true
  adminPassword: "changeme"
  grafana.ini:
    server:
      serve_from_sub_path: true
      root_url: "%(protocol)s://%(domain)s/grafana/"

alertmanager:
  enabled: false

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
